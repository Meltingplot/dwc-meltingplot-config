name: Release

# Builds the plugin against the latest stable DuetWebControl release and
# publishes a GitHub Release.
#
# Trigger: push to the `release` branch (or run manually via workflow_dispatch).
# Version: taken from the `version` field in plugin.json (override with the
#   workflow_dispatch `version` input). The workflow creates the matching
#   `vX.Y.Z` git tag and GitHub Release itself, so no tag needs to be pushed
#   beforehand. To cut a new release, bump plugin.json on the `release` branch.
on:
  push:
    branches: [release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version X.Y.Z (defaults to plugin.json version)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # Gate releases on the same tests CI runs on main.
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pytest pytest-cov
      - run: pytest tests/ -v --tb=short --cov --cov-report=term-missing
        env:
          PYTHONPATH: dsf

  frontend-tests:
    name: Frontend Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "18"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npx jest tests/frontend/*.test.js --verbose
      - run: npx jest tests/frontend/integration/ --verbose

  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    needs: [python-tests, frontend-tests]
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v6
        with:
          path: plugin
          fetch-depth: 0

      - name: Resolve latest stable DuetWebControl tag
        id: dwc
        run: |
          ref=$(git ls-remote --tags --refs https://github.com/Duet3D/DuetWebControl.git \
            | awk -F/ '{print $NF}' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -n1)
          if [ -z "$ref" ]; then
            echo "::error::Could not resolve a stable DuetWebControl tag"
            exit 1
          fi
          echo "Latest stable DuetWebControl tag: $ref"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Determine plugin version
        id: version
        working-directory: plugin
        run: |
          version="${{ github.event.inputs.version }}"
          if [ -z "$version" ]; then
            version=$(node -p "require('./plugin.json').version")
          fi
          version="${version#v}"
          if ! echo "$version" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::'$version' is not a clean release version (X.Y.Z). Bump plugin.json or pass the version input."
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          # Stamp the resolved version into plugin.json/package.json for the build.
          node -e "const fs=require('fs');for(const f of ['plugin.json','package.json']){const j=JSON.parse(fs.readFileSync(f));j.version=process.argv[1];fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n');}" "$version"

      - name: Ensure release does not already exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "::error::Release ${{ steps.version.outputs.tag }} already exists. Bump the version in plugin.json."
            exit 1
          fi

      - name: Checkout DuetWebControl
        uses: actions/checkout@v6
        with:
          repository: Duet3D/DuetWebControl
          ref: ${{ steps.dwc.outputs.ref }}
          path: DuetWebControl

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "18"

      - name: Install DWC dependencies
        working-directory: DuetWebControl
        run: npm install

      - name: Build plugin
        working-directory: DuetWebControl
        run: npm run build-plugin ../plugin

      - name: Locate built ZIP
        id: zip
        run: |
          zip=$(ls DuetWebControl/dist/MeltingplotConfig-*.zip | head -n1)
          echo "Built ZIP: $zip"
          echo "path=$zip" >> "$GITHUB_OUTPUT"

      - name: Extract plugin ZIP for artifact upload
        run: |
          mkdir -p artifact-content
          unzip "${{ steps.zip.outputs.path }}" -d artifact-content

      - name: Upload plugin ZIP artifact
        uses: actions/upload-artifact@v7
        with:
          name: MeltingplotConfig-plugin
          path: artifact-content/*
          retention-days: 90

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "${{ steps.zip.outputs.path }}" \
            --repo "${{ github.repository }}" \
            --title "MeltingplotConfig ${{ steps.version.outputs.version }}" \
            --target "${{ github.sha }}" \
            --notes "Built against DuetWebControl ${{ steps.dwc.outputs.ref }}." \
            --generate-notes
